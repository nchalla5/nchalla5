<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="30" y1="24" x2="870" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1C2433"/>
    </linearGradient>
    <linearGradient id="track" x1="96" y1="238" x2="806" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EA580C"/>
      <stop offset="0.33" stop-color="#22C55E"/>
      <stop offset="0.66" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="title" x1="78" y1="0" x2="460" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#93C5FD"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="940" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#22C55E" flood-opacity="0.55"/>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38BDF8" flood-opacity="0.5"/>
    </filter>
    <filter id="glowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#F59E0B" flood-opacity="0.5"/>
    </filter>
    <filter id="glowRose" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FB7185" flood-opacity="0.45"/>
    </filter>
    <path id="careerPath" d="M108 250C190 236 226 186 292 176C358 166 403 238 482 230C573 220 608 136 694 126C742 120 781 132 814 148"/>
  </defs>

  <g filter="url(#shadow)">
    <rect x="10" y="10" width="880" height="340" rx="28" fill="url(#bg)"/>
    <rect x="10.75" y="10.75" width="878.5" height="338.5" rx="27.25" stroke="#233046"/>
  </g>

  <circle cx="786" cy="70" r="114" fill="#22C55E" opacity="0.08"/>
  <circle cx="106" cy="314" r="94" fill="#0EA5E9" opacity="0.06"/>

  <use href="#careerPath" stroke="#1E293B" stroke-width="18" stroke-linecap="round"/>
  <use href="#careerPath" stroke="url(#track)" stroke-width="7" stroke-linecap="round"/>

  <circle r="8" fill="#F8FAFC" filter="url(#glowGreen)">
    <animateMotion dur="8.5s" repeatCount="indefinite" rotate="auto">
      <mpath href="#careerPath"/>
    </animateMotion>
  </circle>

  <g transform="translate(120 210)">
    <circle cx="0" cy="0" r="36" fill="#160C0A" stroke="#FB923C" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="#EA580C" opacity="0.12" filter="url(#glowAmber)">
      <animate attributeName="opacity" values="0.12;0.32;0.12" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="8" text-anchor="middle" fill="#FDBA74" font-family="'Fira Sans', Arial, sans-serif" font-size="18" font-weight="700">ORACLE</text>
    <text x="-28" y="64" fill="#F8FAFC" font-family="'Fira Sans', Arial, sans-serif" font-size="15" font-weight="700">Oracle</text>
    <text x="-28" y="84" fill="#94A3B8" font-family="'Fira Sans', Arial, sans-serif" font-size="13">Jan 2021 - Jul 2023</text>
    <text x="-28" y="103" fill="#CBD5E1" font-family="'Fira Sans', Arial, sans-serif" font-size="13">Associate SWE / Intern</text>
  </g>

  <g transform="translate(314 150)">
    <circle cx="0" cy="0" r="36" fill="#071420" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="#38BDF8" opacity="0.12" filter="url(#glowBlue)">
      <animate attributeName="opacity" values="0.12;0.28;0.12" begin="1s" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="8" text-anchor="middle" fill="#7DD3FC" font-family="'Fira Sans', Arial, sans-serif" font-size="20" font-weight="700">ResMed</text>
    <text x="-32" y="70" fill="#F8FAFC" font-family="'Fira Sans', Arial, sans-serif" font-size="15" font-weight="700">ResMed</text>
    <text x="-32" y="90" fill="#94A3B8" font-family="'Fira Sans', Arial, sans-serif" font-size="13">May - Dec 2024</text>
    <text x="-32" y="109" fill="#CBD5E1" font-family="'Fira Sans', Arial, sans-serif" font-size="13">Platform Engineer Intern</text>
  </g>

  <g transform="translate(522 244)">
    <circle cx="0" cy="0" r="36" fill="#17110A" stroke="#FACC15" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="#F59E0B" opacity="0.12" filter="url(#glowAmber)">
      <animate attributeName="opacity" values="0.12;0.28;0.12" begin="2s" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-2" text-anchor="middle" fill="#FDE68A" font-family="'Fira Sans', Arial, sans-serif" font-size="17" font-weight="700">ABR</text>
    <text x="0" y="16" text-anchor="middle" fill="#FDE68A" font-family="'Fira Sans', Arial, sans-serif" font-size="11" letter-spacing="1">AI</text>
    <text x="-48" y="-66" fill="#F8FAFC" font-family="'Fira Sans', Arial, sans-serif" font-size="14" font-weight="700">Auto BIM Route AI</text>
    <text x="-48" y="-47" fill="#94A3B8" font-family="'Fira Sans', Arial, sans-serif" font-size="12">Jan - May 2025</text>
    <text x="-48" y="-29" fill="#CBD5E1" font-family="'Fira Sans', Arial, sans-serif" font-size="12">Software Engineer Intern</text>
  </g>

  <g transform="translate(778 106)">
    <circle cx="0" cy="0" r="36" fill="#07170D" stroke="#4ADE80" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="#22C55E" opacity="0.14" filter="url(#glowGreen)">
      <animate attributeName="opacity" values="0.14;0.32;0.14" begin="3s" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="8" text-anchor="middle" fill="#86EFAC" font-family="Georgia, serif" font-size="26" font-weight="700">S</text>
    <text x="-28" y="74" fill="#F8FAFC" font-family="'Fira Sans', Arial, sans-serif" font-size="15" font-weight="700">Sigma</text>
    <text x="-28" y="94" fill="#94A3B8" font-family="'Fira Sans', Arial, sans-serif" font-size="13">Oct 2025 - Jan 2026</text>
    <text x="-28" y="113" fill="#CBD5E1" font-family="'Fira Sans', Arial, sans-serif" font-size="13">Software Engineer</text>
  </g>

  <circle cx="120" cy="210" r="7" fill="#FDBA74"/>
  <circle cx="314" cy="150" r="7" fill="#7DD3FC"/>
  <circle cx="522" cy="244" r="7" fill="#FDE68A"/>
  <circle cx="778" cy="106" r="7" fill="#86EFAC"/>

  <rect x="70" y="286" width="760" height="36" rx="18" fill="#0F172A" stroke="#1E293B"/>
  <text x="98" y="309" fill="#CBD5E1" font-family="'Fira Code', monospace" font-size="13">intern to engineer</text>
  <text x="272" y="309" fill="#38BDF8" font-family="'Fira Code', monospace" font-size="13">platform + cloud</text>
  <text x="447" y="309" fill="#FBBF24" font-family="'Fira Code', monospace" font-size="13">product engineering</text>
  <text x="665" y="309" fill="#4ADE80" font-family="'Fira Code', monospace" font-size="13">full-time impact</text>
</svg>
