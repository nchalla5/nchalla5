<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="80" y1="50" x2="820" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="940" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="900" height="220" rx="20" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="180" rx="16" fill="#020617" stroke="#1E293B"/>
  <g filter="url(#shadow)">
    <rect x="36" y="36" width="828" height="148" rx="12" fill="#020817" stroke="#23324A"/>
  </g>

  <circle cx="62" cy="58" r="6" fill="#F87171"/>
  <circle cx="82" cy="58" r="6" fill="#FBBF24"/>
  <circle cx="102" cy="58" r="6" fill="#34D399"/>

  <text x="130" y="63" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="16">nithin@portfolio:~</text>

  <text x="58" y="98" fill="#22C55E" font-family="'Fira Code', monospace" font-size="18">$ ./build --systems reliable --ship fast</text>
  <text x="58" y="128" fill="#E2E8F0" font-family="'Fira Code', monospace" font-size="16">Initializing distributed systems...</text>
  <text x="58" y="152" fill="#38BDF8" font-family="'Fira Code', monospace" font-size="16">Loading cloud, backend, and developer tooling...</text>
  <text x="58" y="176" fill="url(#glow)" font-family="'Fira Code', monospace" font-size="16">status: curious = true | latency = optimized | shipping = continuous</text>

  <rect x="734" y="84" width="14" height="22" fill="#22C55E">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
